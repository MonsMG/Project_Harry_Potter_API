<div class="spells-list-container">
  <div class="page-header">
    <h2 class="title">✨ คาถาทั้งหมด</h2>
    <input
      type="text"
      [ngModel]="searchQuery()"
      (ngModelChange)="onSearch($event)"
      placeholder="🔍 ค้นหาชื่อคาถา..."
      class="search-input"
    />
  </div>

  <!-- หากข้อมูลกำลังถูกดึงจาก API อยู่ ให้แสดงสถานะโหลด -->
  @if (spellsData.isLoading()) {
    <div class="status">🪄 กำลังร่ายมนตร์...</div>
  } @else {
    <!-- ส่งข้อมูลสำหรับแสดงผลไปยัง Component ย่อย (สับเอาเฉพาะส่วนแรกตามหน้าปัจจุบันมาแล้ว) -->
    <app-spells-view [spells]="paginatedSpells()" />

    <!-- ถ้ามีจำนวนหน้ามากกว่า 1 หน้า ค่อยแสดงปุ่มเปลี่ยนหน้า -->
    @if (totalPages() > 1) {
      <div class="pagination-controls">
        <!-- ปุ่มกดเพื่อย้อนไปหน้าก่อนหน้านี้ (จะปิดการใช้งานถ้าอยู่หน้า 1) -->
        <button
          (click)="goToPage(currentPage() - 1)"
          [disabled]="currentPage() === 1"
          class="btn-page btn-nav-arrow"
        >
          ← ก่อนหน้า
        </button>

        @for (page of [].constructor(totalPages()); track $index) {
          <button
            (click)="goToPage($index + 1)"
            [class.active]="currentPage() === $index + 1"
            class="btn-page btn-page-number"
          >
            {{ $index + 1 }}
          </button>
        }

        <button
          (click)="goToPage(currentPage() + 1)"
          [disabled]="currentPage() === totalPages()"
          class="btn-page btn-nav-arrow"
        >
          ถัดไป →
        </button>
      </div>

      <p class="pagination-summary">
        หน้า {{ currentPage() }} จาก {{ totalPages() }} (ทั้งหมด {{ filteredSpells().length }} คาถา)
      </p>
    }
  }
</div>
