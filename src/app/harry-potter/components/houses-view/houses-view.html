<div class="character-grid">
  @for (char of characters(); track char.id) {
    <div class="character-card">
      <div class="card-image-wrapper">
        <img
          [src]="char.image || 'https://placehold.co/400x600/1e293b/a1a1aa?text=No+Image'"
          [alt]="char.name"
          class="card-image"
        />
        <div class="image-fade"></div>
      </div>

      <div class="card-info">
        <a
          [routerLink]="['/characters', char.id]"
          class="char-link"
        >
          <h3 class="char-name" [title]="char.name">{{ char.name }}</h3>
        </a>
        <p class="char-actor">{{ char.actor || 'Unknown Actor' }}</p>
      </div>
    </div>
  } @empty {
    <div class="empty-state">ไม่มีข้อมูลนักเรียนในบ้านนี้</div>
  }
</div>
